[build]
  cmd = "go build -o ./bin/api ./cmd/api"
  bin = "./bin/api"
  delay = 1000
  exclude_dir = ["bin", "tmp", "vendor", "internal/db"]
  include_ext = ["go"]
  kill_delay = "0s"
  log = "build-errors.log"
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
