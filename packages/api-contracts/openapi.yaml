openapi: "3.1.0"
info:
  title: RMS Platform API
  version: "0.1.0"
  description: REST API для мобильного клиента и web-клиента RMS Platform

servers:
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: auth
  - name: sync
  - name: photos

paths:
  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/auth/sign-in:
    post:
      operationId: signIn
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Rotate access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sync/pull:
    get:
      operationId: syncPull
      tags: [sync]
      summary: Pull delta changes from server
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          schema:
            type: integer
            format: int64
          description: Server cursor from previous pull (0 for first pull)
      responses:
        "200":
          description: Delta changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sync/push:
    post:
      operationId: syncPush
      tags: [sync]
      summary: Push local changes to server
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRequest"
      responses:
        "200":
          description: Partial-success push result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/photos/upload-url:
    post:
      operationId: getPhotoUploadUrl
      tags: [photos]
      summary: Get pre-signed PUT URL for photo upload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadUrlRequest"
      responses:
        "200":
          description: Pre-signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoUploadUrlResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    EntityType:
      type: string
      enum: [project, plan, room, wall, photo]

    OpType:
      type: string
      enum: [create, update, delete]

    ProjectPayload:
      type: object
      required: [name, isArchived, isFavourite]
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        isArchived:
          type: boolean
        isFavourite:
          type: boolean

    PlanPayload:
      type: object
      required: [projectId, name]
      properties:
        projectId:
          type: string
          format: uuid
        name:
          type: string
        payloadJson:
          nullable: true
          description: Arbitrary geometry JSON for plan canvas

    RoomPayload:
      type: object
      required: [planId]
      properties:
        planId:
          type: string
          format: uuid
        name:
          type: string
          nullable: true

    WallPayload:
      type: object
      required: [roomId]
      properties:
        roomId:
          type: string
          format: uuid

    PhotoPayload:
      type: object
      required: [parentType, parentId, contentType]
      properties:
        parentType:
          type: string
          enum: [project, room, wall]
        parentId:
          type: string
          format: uuid
        contentType:
          type: string
        name:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        takenAt:
          type: integer
          format: int64
          nullable: true
          description: Client-side capture timestamp in epoch milliseconds

    EntitySnapshot:
      type: object
      required: [entityType, entityId, payload]
      properties:
        entityType:
          $ref: "#/components/schemas/EntityType"
        entityId:
          type: string
          format: uuid
        payload:
          oneOf:
            - $ref: "#/components/schemas/ProjectPayload"
            - $ref: "#/components/schemas/PlanPayload"
            - $ref: "#/components/schemas/RoomPayload"
            - $ref: "#/components/schemas/WallPayload"
            - $ref: "#/components/schemas/PhotoPayload"
          discriminator:
            propertyName: entityType
            mapping:
              project: "#/components/schemas/ProjectPayload"
              plan: "#/components/schemas/PlanPayload"
              room: "#/components/schemas/RoomPayload"
              wall: "#/components/schemas/WallPayload"
              photo: "#/components/schemas/PhotoPayload"

    PushOperation:
      type: object
      required: [clientOpId, op, entityType, entityId, clientUpdatedAt, payload]
      properties:
        clientOpId:
          type: string
          format: uuid
        op:
          $ref: "#/components/schemas/OpType"
        entityType:
          $ref: "#/components/schemas/EntityType"
        entityId:
          type: string
          format: uuid
        clientUpdatedAt:
          type: integer
          format: int64
          description: Client-side timestamp in epoch milliseconds
        payload:
          oneOf:
            - $ref: "#/components/schemas/ProjectPayload"
            - $ref: "#/components/schemas/PlanPayload"
            - $ref: "#/components/schemas/RoomPayload"
            - $ref: "#/components/schemas/WallPayload"
            - $ref: "#/components/schemas/PhotoPayload"
          discriminator:
            propertyName: entityType
            mapping:
              project: "#/components/schemas/ProjectPayload"
              plan: "#/components/schemas/PlanPayload"
              room: "#/components/schemas/RoomPayload"
              wall: "#/components/schemas/WallPayload"
              photo: "#/components/schemas/PhotoPayload"

    PullChange:
      type: object
      required: [entityType, entityId, payload, updatedAt, syncCursor]
      properties:
        entityType:
          $ref: "#/components/schemas/EntityType"
        entityId:
          type: string
          format: uuid
        payload:
          oneOf:
            - $ref: "#/components/schemas/ProjectPayload"
            - $ref: "#/components/schemas/PlanPayload"
            - $ref: "#/components/schemas/RoomPayload"
            - $ref: "#/components/schemas/WallPayload"
            - $ref: "#/components/schemas/PhotoPayload"
          discriminator:
            propertyName: entityType
            mapping:
              project: "#/components/schemas/ProjectPayload"
              plan: "#/components/schemas/PlanPayload"
              room: "#/components/schemas/RoomPayload"
              wall: "#/components/schemas/WallPayload"
              photo: "#/components/schemas/PhotoPayload"
        updatedAt:
          type: integer
          format: int64
          description: Server-side updated_at in epoch milliseconds
        syncCursor:
          type: integer
          format: int64
        deletedAt:
          type: integer
          format: int64
          nullable: true
          description: Tombstone marker in epoch milliseconds; null means not deleted

    PushConflict:
      type: object
      required: [clientOpId, reason, serverVersion]
      properties:
        clientOpId:
          type: string
          format: uuid
        reason:
          type: string
          enum: [stale]
        serverVersion:
          $ref: "#/components/schemas/EntitySnapshot"

    PushError:
      type: object
      required: [clientOpId, reason, message]
      properties:
        clientOpId:
          type: string
          format: uuid
        reason:
          type: string
          enum: [validation, notFound, forbidden, unknown]
        message:
          type: string

    PullResponse:
      type: object
      required: [cursor, changes]
      properties:
        cursor:
          type: integer
          format: int64
        changes:
          type: array
          items:
            $ref: "#/components/schemas/PullChange"

    PushRequest:
      type: object
      required: [operations]
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/PushOperation"

    PushResponse:
      type: object
      required: [cursor, applied, conflicts, errors]
      properties:
        cursor:
          type: integer
          format: int64
          description: >
            Max sync_cursor among applied operations; 0 if no operations were applied (e.g. all were
            conflicts or errors). This value must NOT be used as `since` for pull — use the pull
            endpoint's own cursor returned by GET /sync/pull.
        applied:
          type: array
          items:
            type: string
            format: uuid
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/PushConflict"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/PushError"

    PhotoUploadUrlRequest:
      type: object
      required: [photoId, contentType]
      properties:
        photoId:
          type: string
          format: uuid
        contentType:
          type: string

    PhotoUploadUrlResponse:
      type: object
      required: [uploadUrl, method, headers, expiresAt]
      properties:
        uploadUrl:
          type: string
          format: uri
        method:
          type: string
          enum: [PUT]
        headers:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: integer
          format: int64
          description: Expiry time in epoch milliseconds

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
